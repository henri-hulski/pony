[flake8]
show-source = True
ignore = E203, E301, E302, E305, E403, E701, E704, F401, F403, F405, F821, W503, W504, W605
max-line-length = 93
exclude = *.pyc, *.py, .venv

# Global options:
[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
# files = pony/**/*.pyi, pony/orm/tests, pony/orm/examples
packages = pony.orm
